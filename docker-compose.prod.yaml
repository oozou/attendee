services:
  attendee-app:
    build: ./
    networks:
      - attendee_network
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=attendee.settings.production
      - POSTGRES_SSL_REQUIRE=false
      - DJANGO_SSL_REQUIRE=false
    command: gunicorn attendee.wsgi -b 0.0.0.0:8000 --workers 4
    entrypoint: []
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  attendee-worker:
    build: ./
    networks:
      - attendee_network
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=attendee.settings.production
      - POSTGRES_SSL_REQUIRE=false
      - ENABLE_CHROME_SANDBOX=false
    command: "celery -A attendee worker -l INFO"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  attendee-scheduler:
    build: ./
    networks:
      - attendee_network
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=attendee.settings.production
      - POSTGRES_SSL_REQUIRE=false
    command: "python manage.py run_scheduler"
    entrypoint: []
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  attendee-webpage-streamer:
    build: ./
    networks:
      - attendee_network
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=attendee.settings.production
      - ENABLE_CHROME_SANDBOX=true
    command: "python bots/webpage_streamer/run_webpage_streamer.py"
    security_opt:
      - seccomp=./bots/web_bot_adapter/chrome_seccomp.json
    profiles:
      - webpage-streamer
    restart: unless-stopped

  postgres:
    image: postgres:15.3-alpine
    environment:
      POSTGRES_DB: attendee
      POSTGRES_USER: attendee
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    networks:
      - attendee_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - attendee_network
    restart: unless-stopped
    volumes:
      - redis:/data/redis

networks:
  attendee_network:
    driver: bridge

volumes:
  postgres:
  redis:
